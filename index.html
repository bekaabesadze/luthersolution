<!DOCTYPE html>
<html lang="en">

    <meta name="author" content="Beka Abesadze" />

    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="CBA Dashboard" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512.png" />
    <title>Competitor Bank Analytics | CBA – Beka Abesadze</title>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Competitor Bank Analytics",
      "description": "Internal dashboard for quarterly bank performance and CAMEL metrics.",
      "author": {
        "@type": "Person",
        "name": "Beka Abesadze",
        "email": "bekaabesadze007@gmail.com",
        "url": "https://www.linkedin.com/in/beka-abesadze-2387a0287/"
      }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- Apply saved theme before React mounts to prevent flash -->
    <script>
      (function(){var t=localStorage.getItem('theme');if(t==='light'||t==='dark'||t==='slate')document.documentElement.setAttribute('data-theme',t);})();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
