services:
  - type: web
    name: bank-analytics-backend
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: FRONTEND_URL
        value: "https://luthersolution.com"
      - key: PYTHON_VERSION
        value: "3.10.0"
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
